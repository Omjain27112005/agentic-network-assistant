# =============================================
# Docker Compose — Infrastructure Stack
# =============================================
# Services: Kafka + Zookeeper + Redis + PostgreSQL
# Run: docker-compose up -d
# Stop: docker-compose down
# Reset volumes: docker-compose down -v

version: "3.9"

services:

  # -----------------------------------------------
  # Zookeeper — Required by Kafka for coordination
  # -----------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ana_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - ana_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Kafka Broker — Event streaming backbone
  # All services communicate through Kafka topics
  # -----------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ana_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # External access (our Python services)
      - "9101:9101"       # JMX port for monitoring
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days retention
      KAFKA_LOG_SEGMENT_BYTES: 1073741824   # 1GB per segment
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ana_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # -----------------------------------------------
  # Kafka UI — Web dashboard to inspect topics/messages
  # Access at: http://localhost:8080
  # -----------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ana_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - ana_network

  # -----------------------------------------------
  # Redis — In-memory store for live metrics + cache
  # -----------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: ana_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ana_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # Redis Commander — Web UI for Redis inspection
  # Access at: http://localhost:8081
  # -----------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ana_redis_ui
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - ana_network

  # -----------------------------------------------
  # PostgreSQL — Persistent storage for incidents
  # -----------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ana_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: network_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ana_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d network_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

# -----------------------------------------------
# Named Volumes — Persistent data storage
# -----------------------------------------------
volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  redis_data:
  postgres_data:

# -----------------------------------------------
# Network — All services on same internal network
# -----------------------------------------------
networks:
  ana_network:
    driver: bridge
    name: ana_network
